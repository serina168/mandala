<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 大理石底色：奶油白 → 暖米 -->
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFAF5"/>
      <stop offset="35%" stop-color="#F9F3E6"/>
      <stop offset="70%" stop-color="#F5EFE4"/>
      <stop offset="100%" stop-color="#EBE0CC"/>
    </linearGradient>

    <!-- 紋路用：金棕色雲霧筆觸 -->
    <radialGradient id="vein1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vein2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#9B7A45" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9B7A45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vein3" cx="50%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#C4806A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C4806A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vein4" cx="90%" cy="10%" r="35%">
      <stop offset="0%" stop-color="#E8D5B0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#E8D5B0" stop-opacity="0"/>
    </radialGradient>

    <!-- 細紋筆觸（手繪曲線） -->
    <filter id="turbulence" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.024" numOctaves="3" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.79
                             0 0 0 0 0.66
                             0 0 0 0 0.43
                             0 0 0 0.16 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="softBlur"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>

  <!-- 1) 大理石底色漸層 -->
  <rect width="100%" height="100%" fill="url(#baseGrad)"/>

  <!-- 2) 多顆柔光雲霧 -->
  <rect width="100%" height="100%" fill="url(#vein1)"/>
  <rect width="100%" height="100%" fill="url(#vein2)"/>
  <rect width="100%" height="100%" fill="url(#vein3)"/>
  <rect width="100%" height="100%" fill="url(#vein4)"/>

  <!-- 3) 手繪大理石紋路（金棕色曲線） -->
  <g filter="url(#softBlur)" opacity="0.55">
    <path d="M -50 280 Q 200 200, 420 320 T 900 280 T 1400 360 T 1700 320"
          stroke="#C9A96E" stroke-width="1.2" fill="none" stroke-opacity="0.35"/>
    <path d="M -50 460 Q 280 380, 500 500 T 1000 470 T 1500 540 T 1700 500"
          stroke="#9B7A45" stroke-width="0.8" fill="none" stroke-opacity="0.25"/>
    <path d="M -50 720 Q 220 650, 480 760 T 950 740 T 1450 800 T 1700 770"
          stroke="#C9A96E" stroke-width="1.0" fill="none" stroke-opacity="0.30"/>
    <path d="M -50 950 Q 250 880, 520 970 T 1020 940 T 1500 1010 T 1700 980"
          stroke="#9B7A45" stroke-width="0.7" fill="none" stroke-opacity="0.20"/>

    <!-- 細紋小斑紋 -->
    <path d="M 150 100 Q 280 140, 380 130 T 580 180"
          stroke="#C9A96E" stroke-width="0.6" fill="none" stroke-opacity="0.30"/>
    <path d="M 920 200 Q 1050 230, 1180 220 T 1400 270"
          stroke="#9B7A45" stroke-width="0.6" fill="none" stroke-opacity="0.25"/>
    <path d="M 80 580 Q 200 620, 320 600 T 520 650"
          stroke="#C9A96E" stroke-width="0.5" fill="none" stroke-opacity="0.22"/>
    <path d="M 1050 880 Q 1180 910, 1300 900 T 1500 940"
          stroke="#9B7A45" stroke-width="0.5" fill="none" stroke-opacity="0.22"/>
  </g>

  <!-- 4) 紋理層 — turbulence 模擬細小石材顆粒 -->
  <rect width="100%" height="100%" filter="url(#turbulence)" opacity="0.42"/>
</svg>
